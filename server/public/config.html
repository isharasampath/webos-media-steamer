<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Media Server Config</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: white;
            padding: 50px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        /* Path Display Section */
        .path-display {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #444;
            margin-bottom: 20px;
            font-family: monospace;
            color: #f1c40f;
            font-size: 1.1em;
        }

        .btn {
            background: #f1c40f;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #d4ac0d;
            transform: translateY(-2px);
        }

        /* Modal / Browser Overlay */
        #browserModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
        }

        .modal-content {
            background: #222;
            width: 80%;
            max-width: 600px;
            margin: 5% auto;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #444;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .dir-list {
            flex-grow: 1;
            overflow-y: auto;
            background: #1a1a1a;
            margin: 15px 0;
            border: 1px solid #333;
            border-radius: 5px;
        }

        .dir-item {
            padding: 12px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }

        .dir-item:hover {
            background: #333;
            color: #f1c40f;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .current-nav-path {
            font-size: 0.9em;
            color: #888;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Media Library Configuration</h2>
        <p>Currently serving media from:</p>
        <div id="activePathDisplay" class="path-display">Loading...</div>

        <button class="btn" onclick="openBrowser()">📂 Change Media Directory</button>
    </div>

    <div id="browserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0">Select Media Folder</h3>
                <button class="btn" onclick="closeBrowser()"
                    style="background:#444; color:white; padding:5px 15px;">Close</button>
            </div>

            <div class="current-nav-path" id="navPath">D:\</div>

            <div id="dirExplorer" class="dir-list"></div>

            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#555; color:white; flex:1" onclick="goUp()">⬆️ Go Back</button>
                <button class="btn" style="flex:2" onclick="confirmSelection()">✅ Select This Folder</button>
            </div>
        </div>
    </div>

    <script>
        let tempBrowsingPath = "";

        async function init() {
            const res = await fetch('/api/get-config');
            const config = await res.json();
            document.getElementById('activePathDisplay').innerText = config.movieDir;
            tempBrowsingPath = config.movieDir;
        }

        function openBrowser() {
            document.getElementById('browserModal').style.display = 'block';
            loadDirectory(tempBrowsingPath);
        }

        function closeBrowser() {
            document.getElementById('browserModal').style.display = 'none';
        }

        async function loadDirectory(path) {
            document.getElementById('navPath').innerText = path;
            try {
                const res = await fetch(`/api/browse-fs?path=${encodeURIComponent(path)}`);
                const folders = await res.json();
                const explorer = document.getElementById('dirExplorer');
                explorer.innerHTML = "";

                folders.forEach(folder => {
                    const div = document.createElement('div');
                    div.className = 'dir-item';
                    div.innerHTML = `📁 ${folder}`;
                    div.onclick = () => {
                        const sep = tempBrowsingPath.includes('\\') ? '\\' : '/';
                        tempBrowsingPath = tempBrowsingPath.endsWith(sep) ? tempBrowsingPath + folder : tempBrowsingPath + sep + folder;
                        loadDirectory(tempBrowsingPath);
                    };
                    explorer.appendChild(div);
                });
            } catch (e) { explorer.innerHTML = "Error reading folder."; }
        }

        function goUp() {
            const sep = tempBrowsingPath.includes('\\') ? '\\' : '/';
            const parts = tempBrowsingPath.split(sep).filter(p => p !== "");
            if (parts.length > 1) {
                parts.pop();
                tempBrowsingPath = parts.join(sep);
                if (tempBrowsingPath.length === 2 && tempBrowsingPath.endsWith(":")) tempBrowsingPath += sep;
                loadDirectory(tempBrowsingPath);
            }
        }

        async function confirmSelection() {
            console.log("Attempting to save path:", tempBrowsingPath);

            try {
                const res = await fetch('/api/set-directory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: tempBrowsingPath }) // Ensure this matches tempBrowsingPath
                });

                const result = await res.json();

                // Check for 'success' or just check if the status is OK
                if (res.ok && result.success) {
                    document.getElementById('activePathDisplay').innerText = tempBrowsingPath;
                    closeBrowser();
                    console.log("Path saved successfully!");
                } else {
                    alert("Error from server: " + (result.message || "Unknown error"));
                }
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Could not connect to the server. Is it running?");
            }
        }

        init();
    </script>
</body>

</html>
